{% extends "digital/base.html" %}

{% block content %}
    <h2>Delete Resource</h2>
    <p>Are you sure you want to delete "{{ resource.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
        <a href="{% url 'admin' %}">Cancel</a>
    </form>
{% endblock %}
