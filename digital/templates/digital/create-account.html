<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
body {
    display: flex;
    flex-direction: column;
    align-items: center;
}

h1 {
    color: #2563eb;
    font-size: 1.3rem;
}


form {
    box-shadow: 3px 4px 6px gainsboro;
    width: 100%;
    display: flex;
    flex-direction: column;
}

form label {
    padding: 1rem;
    margin: 1rem;
}

form input {
    padding: 0.6rem ;
    margin: 1rem;
    width: 50%;
}

.button {
    display: flex;
    align-self: center;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    width: 80%;
}

.button button {
    padding: 0.3rem 1.6rem;
    background-color: #2563eb;
    color: white;
    border: none;
    border-radius: 5rem;
    cursor: pointer;
}

/* ================= SMALL SCREEN (480px) ================= */
@media (min-width: 480px) {
    body {
        /*background-color: blue;*/
}

form {
    box-shadow: 3px 4px 6px gainsboro;
    width: 100%;
    display: flex;
    flex-direction: column;
}

.form {
    width: 50%;
}

}
/* =============== END SMALL SCREEN (480px) =============== */


/* ================= TABLET SCREEN (768px) ================= */
@media (min-width: 768px) {
    body {
        /*background-color: purple;*/
}

form {
    box-shadow: 3px 4px 6px gainsboro;
    width: 50%;
    display: flex;
    flex-direction: column;
}


}
/* =============== END TABLET SCREEN (768px) =============== */

</style>
<body>
    <h1>Create Account</h1>
    <form method="post">
        {% csrf_token %}
        <div class="username">
            <label for="username">Name:</label>
            <input type="text" name="username" id="username" required>
        </div>
        
        <div class="email">
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" required>
        </div>
    
        <div class="password">
            <label for="password">Passw:</label>
            <input type="password" name="password" id="password" required>
        </div>
        <div class="button">
            <button type="submit">Create Account</button>
        </div>
    </form>
    {% if error_message %}
        <p style="color: red;">{{ error_message }}</p>
    {% endif %}
<div class="navigation-s">
    <p><a href="{% url 'login' %}">Already have an account? Login here.</a></p>
</div>
</body>
</html>
