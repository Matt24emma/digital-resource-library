<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
body {
    margin: 0;
    padding: 0;
}

* {
    margin: 0;
    padding: 0;
}


.upload-form {
    width: 98%;
    display: flex;
    flex-direction: column;
    align-self: center;
    justify-self: center;
    margin-top: 1rem;
    box-shadow: 3px 4px 6px gainsboro;
}



form {
    display: flex;
    flex-direction: column;
    margin-left: 1rem;
    margin-right: 1rem;
}

.form-group {
    display: flex;
    flex-direction: column;
    margin-top: 1.6rem;
}

.form-group input,
.form-group textarea {
    width: 90%;
    padding: 0.8rem 1rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 1rem;
}


.form-group textarea {
    resize: vertical;
}

.button {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1rem;
    margin-bottom: 1rem;
}

.upload-form button {
    padding: 0.9rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background-color: #2563eb;
    width: 30%;
    color: white;
}

.cancel {
    margin-top: 1rem;
    display: flex;
    justify-content: center;
}

/* ================= LARGE SCREEN (1280px) ================= */
@media (min-width: 1280px) {
    body {
        /*background-color: pink;*/
}


.upload-form {
    width: 50%;
    display: flex;
    flex-direction: column;
    align-self: center;
    justify-self: center;
    margin-top: 1rem;
    box-shadow: 3px 4px 6px gainsboro;
}



form {
    display: flex;
    flex-direction: column;
}

.form-group {
    display: flex;
    flex-direction: column;
    margin-top: 1.6rem;
}

.form-group input,
.form-group textarea {
    width: 90%;
    padding: 0.8rem 1rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 1rem;
}


.form-group textarea {
    resize: vertical;
}

.button {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1rem;
    margin-bottom: 1rem;
}

.upload-form button {
    padding: 0.9rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background-color: #2563eb;
    width: 30%;
    color: white;
}
}
/* =============== END LARGE SCREEN (1280px) =============== */

</style>
<body>
    <div class="upload-form">
        <form action="" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
    
            <div class="form-group">
                <label for="thumbnail">Thumbnail</label>
                <input type="file" id="thumbnail" name="thumbnail" accept="image/*" required>
            </div>
    
            <div class="form-group">
                <label for="file">Resource File</label>
                <input type="file" id="file" name="file" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.txt" required>
            </div>
    
            <div class="form-group">
                <label for="title">Headline</label>
                <input type="text" id="title" name="title" placeholder="Enter title" required>
            </div>
    
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="6" placeholder="Write a description..."
                    required></textarea>
            </div>
    
            <div class="button">
                <button type="submit">Upload</button>
            </div>
        </form>
    </div>
<div class="cancel">
    <p>Do you want to Cancel? <a href="{% url 'admin' %}">Cancel</a></p>
</div>
</body>
</html>
